# Data Configuration
data:
  companies:
    - "HDFCBANK.NS"
    - "RELIANCE.NS"
    - "BHARTIARTL.NS"
  period: "1y"
  
# Portfolio Configuration
portfolio:
  weights: [0.2, 0.2, 0.6]
  initial_investment: 100

# Model Configuration
model:
  hmm:
    n_components: 2
    covariance_type: "full"
    n_iter: 1000
  
  lstm:
    hidden_size: 64
    num_layers: 2
    time_steps: 30
    learning_rate: 0.001
    epochs: 15

# Training Configuration
training:
  train_split: 0.8
  target_horizon: 5  # days ahead

# MLflow Configuration
mlflow:
  experiment_name: "mlops-project"
  tracking_uri: "sqlite:///mlflow.db"
